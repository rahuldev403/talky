version: "3.8"

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: claude-clone-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: claudedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Chroma Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: claude-clone-vector
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # 3. Neo4j Graph Database
  neo4j:
    image: neo4j:5
    container_name: claude-clone-graph
    environment:
      - NEO4J_AUTH=none # <-- Change this line
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
